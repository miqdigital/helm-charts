apiVersion: v2
name: akto-ai-guardrails-v2
description: Helm chart for deploying the full Akto AI Guardrails stack (data ingestion, guardrails service, kafka, redis, embedder, agent guard, anonymizer)
type: application
version: 0.1.0
appVersion: "0.1.0"
home: https://www.akto.io
icon: https://akto-setup.s3.amazonaws.com/templates/128x128.png
sources:
  - https://github.com/akto-api-security/helm-charts/tree/master/charts/akto-ai-guardrails-v2
keywords:
  - akto
  - ai
  - guardrails
  - security
  - llm
  - agent-guard
maintainers:
  - name: Ankush Jain
    email: ankush@akto.io
dependencies:
  # Reuses the existing data-ingestion-service chart as-is instead of duplicating
  # its templates. This is a local path dependency, so bump this version to
  # match charts/data-ingestion-service/Chart.yaml whenever that chart is
  # released, then re-run `helm dependency update`.
  - name: data-ingestion-service
    version: "0.1.8-sha"
    repository: "file://../data-ingestion-service"
    alias: ingestion
    condition: ingestion.enabled
  # Optional - only installed when csiDriver.install=true. Mirrors the same
  # dependencies charts/akto-setup-dashboard uses for Azure Key Vault-backed
  # secrets. Set to false (default) if the CSI driver is already installed
  # cluster-wide.
  - name: secrets-store-csi-driver
    version: "1.4.x"
    repository: "https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts"
    condition: csiDriver.install
  - name: csi-secrets-store-provider-azure
    version: "1.5.x"
    repository: "https://azure.github.io/secrets-store-csi-driver-provider-azure/charts"
    condition: csiDriver.install
