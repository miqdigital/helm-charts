{{- if .Values.anonymizer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "akto-ai-guardrails-v2.fullname" . }}-anonymizer
  labels:
    {{- include "akto-ai-guardrails-v2.componentLabels" (list . "anonymizer") | nindent 4 }}
spec:
  replicas: {{ .Values.anonymizer.replicas }}
  selector:
    matchLabels:
      {{- include "akto-ai-guardrails-v2.componentSelectorLabels" (list . "anonymizer") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "akto-ai-guardrails-v2.componentSelectorLabels" (list . "anonymizer") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "akto-ai-guardrails-v2.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: anonymizer
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.anonymizer.image.repository }}:{{ .Values.anonymizer.image.tag }}"
        imagePullPolicy: {{ .Values.anonymizer.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.anonymizer.service.targetPort }}
          protocol: TCP
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PORT
          value: {{ quote .Values.anonymizer.service.targetPort }}
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        {{- if .Values.anonymizer.livenessProbe.enabled }}
        livenessProbe:
          httpGet:
            path: {{ .Values.anonymizer.livenessProbe.httpGet.path }}
            port: {{ .Values.anonymizer.livenessProbe.httpGet.port }}
          initialDelaySeconds: {{ .Values.anonymizer.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.anonymizer.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.anonymizer.livenessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.anonymizer.livenessProbe.failureThreshold }}
        {{- end }}
        {{- if .Values.anonymizer.readinessProbe.enabled }}
        readinessProbe:
          httpGet:
            path: {{ .Values.anonymizer.readinessProbe.httpGet.path }}
            port: {{ .Values.anonymizer.readinessProbe.httpGet.port }}
          initialDelaySeconds: {{ .Values.anonymizer.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.anonymizer.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.anonymizer.readinessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.anonymizer.readinessProbe.failureThreshold }}
        {{- end }}
        resources:
          {{- toYaml .Values.anonymizer.resources | nindent 10 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "akto-ai-guardrails-v2.fullname" . }}-anonymizer
  labels:
    {{- include "akto-ai-guardrails-v2.componentLabels" (list . "anonymizer") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.anonymizer.service.port }}
    targetPort: {{ .Values.anonymizer.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    {{- include "akto-ai-guardrails-v2.componentSelectorLabels" (list . "anonymizer") | nindent 4 }}
{{- end }}
