{{- if .Values.guardrailsKafka.enabled }}
{{- if .Values.guardrailsKafka.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "akto-ai-guardrails-v2.fullname" . }}-guardrails-kafka-data
  labels:
    {{- include "akto-ai-guardrails-v2.componentLabels" (list . "guardrails-kafka") | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.guardrailsKafka.persistence.storageClass }}
  storageClassName: {{ .Values.guardrailsKafka.persistence.storageClass | quote }}
  {{- else if .Values.global.storageClass }}
  storageClassName: {{ .Values.global.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.guardrailsKafka.persistence.size | quote }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "akto-ai-guardrails-v2.fullname" . }}-guardrails-kafka
  labels:
    {{- include "akto-ai-guardrails-v2.componentLabels" (list . "guardrails-kafka") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "akto-ai-guardrails-v2.componentSelectorLabels" (list . "guardrails-kafka") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "akto-ai-guardrails-v2.componentSelectorLabels" (list . "guardrails-kafka") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "akto-ai-guardrails-v2.serviceAccountName" . }}
      containers:
      - name: kafka
        image: "{{ .Values.guardrailsKafka.image.repository }}:{{ .Values.guardrailsKafka.image.tag }}"
        imagePullPolicy: IfNotPresent
        env:
        # KRaft mode: single node acting as both broker and controller (no
        # Zookeeper). Mirrors the mini-runtime Kafka config so this bundled
        # broker matches it version-for-version and mode-for-mode.
        - name: KAFKA_PROCESS_ROLES
          value: "broker,controller"
        - name: KAFKA_NODE_ID
          value: "1"
        - name: KAFKA_BROKER_ID
          value: "1"
        - name: CLUSTER_ID
          value: {{ quote .Values.guardrailsKafka.clusterId }}
        - name: KAFKA_CONTROLLER_QUORUM_VOTERS
          value: "1@localhost:9093"
        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: "CONTROLLER"
        - name: KAFKA_LISTENERS
          value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://{{ include "akto-ai-guardrails-v2.fullname" . }}-guardrails-kafka:9092"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "PLAINTEXT"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
          value: "1"
        - name: KAFKA_CREATE_TOPICS
          value: {{ quote .Values.guardrailsKafka.createTopics }}
        - name: KAFKA_LOG_RETENTION_HOURS
          value: {{ quote .Values.guardrailsKafka.logRetentionHours }}
        - name: KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS
          value: "60000"
        - name: KAFKA_LOG_CLEANER_ENABLE
          value: "true"
        ports:
        - name: broker
          containerPort: 9092
        resources:
          {{- toYaml .Values.guardrailsKafka.resources | nindent 10 }}
        {{- if .Values.guardrailsKafka.persistence.enabled }}
        volumeMounts:
        - name: kafka-data
          mountPath: /var/lib/kafka/data
        {{- end }}
      {{- if .Values.guardrailsKafka.persistence.enabled }}
      volumes:
      - name: kafka-data
        persistentVolumeClaim:
          claimName: {{ include "akto-ai-guardrails-v2.fullname" . }}-guardrails-kafka-data
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "akto-ai-guardrails-v2.fullname" . }}-guardrails-kafka
  labels:
    {{- include "akto-ai-guardrails-v2.componentLabels" (list . "guardrails-kafka") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: 9092
    targetPort: broker
    name: broker
  selector:
    {{- include "akto-ai-guardrails-v2.componentSelectorLabels" (list . "guardrails-kafka") | nindent 4 }}
{{- end }}
