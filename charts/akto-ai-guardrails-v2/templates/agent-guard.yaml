{{- if .Values.agentGuard.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "akto-ai-guardrails-v2.fullname" . }}-agent-guard-secrets
  labels:
    {{- include "akto-ai-guardrails-v2.componentLabels" (list . "agent-guard") | nindent 4 }}
type: Opaque
stringData:
  QWEN3GUARD_SA_KEY_JSON: {{ .Values.agentGuard.secrets.qwen3guardSaKeyJson | quote }}
  QWEN3GUARD_PROJECT: {{ .Values.agentGuard.secrets.qwen3guardProject | quote }}
  QWEN3GUARD_LOCATION: {{ .Values.agentGuard.secrets.qwen3guardLocation | quote }}
  QWEN3GUARD_ENDPOINT_ID: {{ .Values.agentGuard.secrets.qwen3guardEndpointId | quote }}
  QWEN3GUARD_DEDICATED_DNS: {{ .Values.agentGuard.secrets.qwen3guardDedicatedDns | quote }}
  GEMMA_VERTEX_SA_KEY_JSON: {{ .Values.agentGuard.secrets.gemmaVertexSaKeyJson | quote }}
  GEMMA_VERTEX_PROJECT: {{ .Values.agentGuard.secrets.gemmaVertexProject | quote }}
  GEMMA_VERTEX_LOCATION: {{ .Values.agentGuard.secrets.gemmaVertexLocation | quote }}
  GEMMA_VERTEX_ENDPOINT_ID: {{ .Values.agentGuard.secrets.gemmaVertexEndpointId | quote }}
  GEMMA_VERTEX_DEDICATED_DNS: {{ .Values.agentGuard.secrets.gemmaVertexDedicatedDns | quote }}
  ANTHROPIC_API_KEY: {{ .Values.agentGuard.secrets.anthropicApiKey | quote }}
  ANTHROPIC_MODEL: {{ .Values.agentGuard.secrets.anthropicModel | quote }}
  OPENAI_API_KEY: {{ .Values.agentGuard.secrets.openaiApiKey | quote }}
  OPENAI_MODEL: {{ .Values.agentGuard.secrets.openaiModel | quote }}
  OPENAI_COMPATIBLE_BASE_URL: {{ .Values.agentGuard.secrets.openaiCompatibleBaseUrl | quote }}
  DEFAULT_MODEL_CONFIG_JSON: {{ .Values.agentGuard.secrets.defaultModelConfigJson | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "akto-ai-guardrails-v2.fullname" . }}-agent-guard
  labels:
    {{- include "akto-ai-guardrails-v2.componentLabels" (list . "agent-guard") | nindent 4 }}
spec:
  replicas: {{ .Values.agentGuard.replicas }}
  selector:
    matchLabels:
      {{- include "akto-ai-guardrails-v2.componentSelectorLabels" (list . "agent-guard") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "akto-ai-guardrails-v2.componentSelectorLabels" (list . "agent-guard") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "akto-ai-guardrails-v2.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: agent-guard
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.agentGuard.image.repository }}:{{ .Values.agentGuard.image.tag }}"
        imagePullPolicy: {{ .Values.agentGuard.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.agentGuard.service.targetPort }}
          protocol: TCP
        envFrom:
        - secretRef:
            name: {{ include "akto-ai-guardrails-v2.fullname" . }}-agent-guard-secrets
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PORT
          value: {{ quote .Values.agentGuard.service.targetPort }}
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        {{- if .Values.anonymizer.enabled }}
        - name: ANONYMIZER_URL
          value: {{ include "akto-ai-guardrails-v2.anonymizer.url" . | quote }}
        {{- end }}
        {{- if .Values.embedder.enabled }}
        - name: EMBEDDER_URL
          value: {{ include "akto-ai-guardrails-v2.embedder.url" . | quote }}
        {{- end }}
        {{- if .Values.agentGuard.env.cacheMode }}
        - name: CACHE_MODE
          value: {{ quote .Values.agentGuard.env.cacheMode }}
        {{- end }}
        {{- if .Values.redis.enabled }}
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "akto-ai-guardrails-v2.redis.secretName" . }}
              key: {{ .Values.redis.auth.existingSecretKey }}
        # $(REDIS_PASSWORD) is expanded by Kubernetes from the env var defined
        # just above - not a shell substitution, so this works without a
        # command wrapper. See "dependent environment variables" in the k8s docs.
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@{{ include "akto-ai-guardrails-v2.redis.host" . }}:{{ .Values.redis.service.port }}"
        {{- end }}
        {{- if .Values.agentGuard.env.databaseAbstractorServiceUrl }}
        - name: DATABASE_ABSTRACTOR_SERVICE_URL
          value: {{ quote .Values.agentGuard.env.databaseAbstractorServiceUrl }}
        {{- end }}
        {{- if .Values.agentGuard.env.slackWebhookUrl }}
        - name: SLACK_WEBHOOK_URL
          value: {{ quote .Values.agentGuard.env.slackWebhookUrl }}
        {{- end }}
        {{- if .Values.agentGuard.livenessProbe.enabled }}
        livenessProbe:
          httpGet:
            path: {{ .Values.agentGuard.livenessProbe.httpGet.path }}
            port: {{ .Values.agentGuard.livenessProbe.httpGet.port }}
          initialDelaySeconds: {{ .Values.agentGuard.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.agentGuard.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.agentGuard.livenessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.agentGuard.livenessProbe.failureThreshold }}
        {{- end }}
        {{- if .Values.agentGuard.readinessProbe.enabled }}
        readinessProbe:
          httpGet:
            path: {{ .Values.agentGuard.readinessProbe.httpGet.path }}
            port: {{ .Values.agentGuard.readinessProbe.httpGet.port }}
          initialDelaySeconds: {{ .Values.agentGuard.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.agentGuard.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.agentGuard.readinessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.agentGuard.readinessProbe.failureThreshold }}
        {{- end }}
        resources:
          {{- toYaml .Values.agentGuard.resources | nindent 10 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "akto-ai-guardrails-v2.fullname" . }}-agent-guard
  labels:
    {{- include "akto-ai-guardrails-v2.componentLabels" (list . "agent-guard") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.agentGuard.service.port }}
    targetPort: {{ .Values.agentGuard.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    {{- include "akto-ai-guardrails-v2.componentSelectorLabels" (list . "agent-guard") | nindent 4 }}
{{- end }}
