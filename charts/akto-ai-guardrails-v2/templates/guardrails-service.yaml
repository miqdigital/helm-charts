        imagePullPolicy: {{ .Values.guardrailsService.kafka.image.pullPolicy }}
        env:
        - name: KAFKA_ENABLED
          value: "true"
        {{- if .Values.guardrailsService.kafka.env.kafkaBrokerUrl }}
        - name: KAFKA_BROKER_URL
          value: {{ quote .Values.guardrailsService.kafka.env.kafkaBrokerUrl }}
        {{- else if .Values.guardrailsKafka.enabled }}
        - name: KAFKA_BROKER_URL
          value: {{ include "akto-ai-guardrails-v2.guardrailsKafka.brokerUrl" . | quote }}
        {{- else }}
        {{- fail "guardrailsService.kafka.env.kafkaBrokerUrl must be set when guardrailsKafka.enabled=false" }}
        {{- end }}
        - name: KAFKA_TOPIC
          value: {{ quote .Values.guardrailsService.kafka.env.kafkaTopic }}
        - name: KAFKA_GROUP_ID
          value: {{ quote .Values.guardrailsService.kafka.env.kafkaGroupId }}
        - name: KAFKA_BATCH_SIZE
          value: {{ quote .Values.guardrailsService.kafka.env.kafkaBatchSize }}
        - name: KAFKA_BATCH_LINGER_SEC
          value: {{ quote .Values.guardrailsService.kafka.env.kafkaBatchLingerSec }}
        {{- if .Values.guardrailsService.kafka.env.useKeyVaultForDbToken }}
        - name: DATABASE_ABSTRACTOR_SERVICE_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.guardrailsService.kafka.env.dbTokenSecretName }}
              key: {{ .Values.guardrailsService.kafka.env.dbTokenSecretKey }}
        {{- else }}
        - name: DATABASE_ABSTRACTOR_SERVICE_TOKEN
          value: {{ quote .Values.guardrailsService.kafka.env.databaseAbstractorServiceToken }}
        {{- end }}
        - name: DATABASE_ABSTRACTOR_SERVICE_URL
          value: {{ quote .Values.guardrailsService.kafka.env.databaseAbstractorServiceUrl }}
        {{- if .Values.guardrailsService.kafka.env.rsaPublicKey }}
        - name: RSA_PUBLIC_KEY
          value: {{ quote .Values.guardrailsService.kafka.env.rsaPublicKey }}
        {{- end }}
        {{- if .Values.guardrailsService.kafka.env.scannerApiUrl }}
        - name: SCANNER_API_URL
          value: {{ quote .Values.guardrailsService.kafka.env.scannerApiUrl }}
        {{- else if .Values.agentGuard.enabled }}
        - name: SCANNER_API_URL
          value: {{ include "akto-ai-guardrails-v2.agentGuard.url" . | quote }}
        {{- else }}
        {{- fail "guardrailsService.kafka.env.scannerApiUrl must be set when agentGuard.enabled=false" }}
        {{- end }}
        - name: NHI_ENABLED
          value: {{ quote .Values.guardrailsService.kafka.env.nhiEnabled }}
        - name: NHI_SCAN_INTERVAL_MIN
          value: {{ quote .Values.guardrailsService.kafka.env.nhiScanIntervalMin }}
        {{- if .Values.guardrailsService.kafka.env.cacheMode }}
        - name: CACHE_MODE
          value: {{ quote .Values.guardrailsService.kafka.env.cacheMode }}
        {{- end }}
        {{- if .Values.guardrailsService.kafka.env.redisUrl }}
        - name: REDIS_URL
          value: {{ quote .Values.guardrailsService.kafka.env.redisUrl }}
        {{- else if .Values.redis.enabled }}
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "akto-ai-guardrails-v2.redis.secretName" . }}
              key: {{ .Values.redis.auth.existingSecretKey }}
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@{{ include "akto-ai-guardrails-v2.redis.host" . }}:{{ .Values.redis.service.port }}"
        {{- end }}
        {{- if .Values.guardrailsService.kafka.env.embedderUrl }}
        - name: EMBEDDER_URL
          value: {{ quote .Values.guardrailsService.kafka.env.embedderUrl }}
        {{- else if .Values.embedder.enabled }}
        - name: EMBEDDER_URL
          value: {{ include "akto-ai-guardrails-v2.embedder.url" . | quote }}
        {{- end }}
        - name: SCAN_TIMEOUT_SEC
          value: {{ quote .Values.guardrailsService.kafka.env.scanTimeoutSec }}
        - name: GUARDRAILS_VALIDATION_TIMEOUT_MS
          value: {{ quote .Values.guardrailsService.kafka.env.guardrailsValidationTimeoutMs }}
        {{- if .Values.guardrailsService.kafka.env.guardrailsSkipPaths }}
        - name: GUARDRAILS_SKIP_PATHS
          value: {{ quote .Values.guardrailsService.kafka.env.guardrailsSkipPaths }}
        {{- end }}
        - name: LOG_LEVEL
          value: {{ quote .Values.guardrailsService.kafka.env.logLevel }}
        {{- if .Values.guardrailsService.kafka.env.threatBackendUrl }}
        - name: THREAT_BACKEND_URL
          value: {{ quote .Values.guardrailsService.kafka.env.threatBackendUrl }}
        {{- end }}
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        resources:
          {{- toYaml .Values.guardrailsService.kafka.resources | nindent 10 }}
        {{- if .Values.guardrailsService.kafka.env.useKeyVaultForDbToken }}
        volumeMounts:
        - name: secrets-store
          mountPath: /mnt/secrets-store
          readOnly: true
        {{- end }}
      {{- if .Values.guardrailsService.kafka.env.useKeyVaultForDbToken }}
      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: {{ .Values.keyVault.secretProviderClass }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
