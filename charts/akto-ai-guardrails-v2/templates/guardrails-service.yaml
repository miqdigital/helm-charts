{{- if .Values.guardrailsService.http.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "akto-ai-guardrails-v2.fullname" . }}-guardrails-service-http
  labels:
    {{- include "akto-ai-guardrails-v2.componentLabels" (list . "guardrails-service-http") | nindent 4 }}
spec:
  replicas: {{ .Values.guardrailsService.http.replicas }}
  selector:
    matchLabels:
      {{- include "akto-ai-guardrails-v2.componentSelectorLabels" (list . "guardrails-service-http") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "akto-ai-guardrails-v2.componentSelectorLabels" (list . "guardrails-service-http") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "akto-ai-guardrails-v2.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: guardrails-service
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.guardrailsService.http.image.repository }}:{{ .Values.guardrailsService.http.image.tag }}"
        imagePullPolicy: {{ .Values.guardrailsService.http.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.guardrailsService.http.service.targetPort }}
          protocol: TCP
        env:
        - name: SERVER_PORT
          value: {{ quote .Values.guardrailsService.http.service.targetPort }}
        {{- if .Values.guardrailsService.http.env.useKeyVaultForDbToken }}
        - name: DATABASE_ABSTRACTOR_SERVICE_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.guardrailsService.http.env.dbTokenSecretName }}
              key: {{ .Values.guardrailsService.http.env.dbTokenSecretKey }}
        {{- else }}
        - name: DATABASE_ABSTRACTOR_SERVICE_TOKEN
          value: {{ quote .Values.guardrailsService.http.env.databaseAbstractorServiceToken }}
        {{- end }}
        - name: DATABASE_ABSTRACTOR_SERVICE_URL
          value: {{ quote .Values.guardrailsService.http.env.databaseAbstractorServiceUrl }}
        {{- if .Values.guardrailsService.http.env.rsaPublicKey }}
        - name: RSA_PUBLIC_KEY
          value: {{ quote .Values.guardrailsService.http.env.rsaPublicKey }}
        {{- end }}
        {{- if .Values.guardrailsService.http.env.scannerApiUrl }}
        - name: SCANNER_API_URL
          value: {{ quote .Values.guardrailsService.http.env.scannerApiUrl }}
        {{- else if .Values.agentGuard.enabled }}
        - name: SCANNER_API_URL
          value: {{ include "akto-ai-guardrails-v2.agentGuard.url" . | quote }}
        {{- else }}
        {{- fail "guardrailsService.http.env.scannerApiUrl must be set when agentGuard.enabled=false" }}
        {{- end }}
        - name: NHI_ENABLED
          value: {{ quote .Values.guardrailsService.http.env.nhiEnabled }}
        - name: NHI_SCAN_INTERVAL_MIN
          value: {{ quote .Values.guardrailsService.http.env.nhiScanIntervalMin }}
        {{- if .Values.guardrailsService.http.env.cacheMode }}
        - name: CACHE_MODE
          value: {{ quote .Values.guardrailsService.http.env.cacheMode }}
        {{- end }}
        {{- if .Values.guardrailsService.http.env.redisUrl }}
        - name: REDIS_URL
          value: {{ quote .Values.guardrailsService.http.env.redisUrl }}
        {{- else if .Values.redis.enabled }}
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "akto-ai-guardrails-v2.redis.secretName" . }}
              key: {{ .Values.redis.auth.existingSecretKey }}
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@{{ include "akto-ai-guardrails-v2.redis.host" . }}:{{ .Values.redis.service.port }}"
        {{- end }}
        {{- if .Values.guardrailsService.http.env.embedderUrl }}
        - name: EMBEDDER_URL
          value: {{ quote .Values.guardrailsService.http.env.embedderUrl }}
        {{- else if .Values.embedder.enabled }}
        - name: EMBEDDER_URL
          value: {{ include "akto-ai-guardrails-v2.embedder.url" . | quote }}
        {{- end }}
        - name: SCAN_TIMEOUT_SEC
          value: {{ quote .Values.guardrailsService.http.env.scanTimeoutSec }}
        - name: GUARDRAILS_VALIDATION_TIMEOUT_MS
          value: {{ quote .Values.guardrailsService.http.env.guardrailsValidationTimeoutMs }}
        {{- if .Values.guardrailsService.http.env.guardrailsSkipPaths }}
        - name: GUARDRAILS_SKIP_PATHS
          value: {{ quote .Values.guardrailsService.http.env.guardrailsSkipPaths }}
        {{- end }}
        - name: LOG_LEVEL
          value: {{ quote .Values.guardrailsService.http.env.logLevel }}
        {{- if .Values.guardrailsService.http.env.threatBackendUrl }}
        - name: THREAT_BACKEND_URL
          value: {{ quote .Values.guardrailsService.http.env.threatBackendUrl }}
        {{- end }}
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        {{- if .Values.guardrailsService.http.livenessProbe.enabled }}
        livenessProbe:
          httpGet:
            path: {{ .Values.guardrailsService.http.livenessProbe.httpGet.path }}
            port: {{ .Values.guardrailsService.http.livenessProbe.httpGet.port }}
          initialDelaySeconds: {{ .Values.guardrailsService.http.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.guardrailsService.http.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.guardrailsService.http.livenessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.guardrailsService.http.livenessProbe.failureThreshold }}
        {{- end }}
        {{- if .Values.guardrailsService.http.readinessProbe.enabled }}
        readinessProbe:
          httpGet:
            path: {{ .Values.guardrailsService.http.readinessProbe.httpGet.path }}
            port: {{ .Values.guardrailsService.http.readinessProbe.httpGet.port }}
          initialDelaySeconds: {{ .Values.guardrailsService.http.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.guardrailsService.http.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.guardrailsService.http.readinessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.guardrailsService.http.readinessProbe.failureThreshold }}
        {{- end }}
        resources:
          {{- toYaml .Values.guardrailsService.http.resources | nindent 10 }}
        {{- if .Values.guardrailsService.http.env.useKeyVaultForDbToken }}
        volumeMounts:
        - name: secrets-store
          mountPath: /mnt/secrets-store
          readOnly: true
        {{- end }}
      {{- if .Values.guardrailsService.http.env.useKeyVaultForDbToken }}
      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: {{ .Values.keyVault.secretProviderClass }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "akto-ai-guardrails-v2.fullname" . }}-guardrails-service-http
  labels:
    {{- include "akto-ai-guardrails-v2.componentLabels" (list . "guardrails-service-http") | nindent 4 }}
spec:
  type: {{ .Values.guardrailsService.http.service.type }}
  ports:
  - port: {{ .Values.guardrailsService.http.service.port }}
    targetPort: {{ .Values.guardrailsService.http.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    {{- include "akto-ai-guardrails-v2.componentSelectorLabels" (list . "guardrails-service-http") | nindent 4 }}
{{- end }}
---
{{- if .Values.guardrailsService.kafka.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "akto-ai-guardrails-v2.fullname" . }}-guardrails-service-kafka
  labels:
    {{- include "akto-ai-guardrails-v2.componentLabels" (list . "guardrails-service-kafka") | nindent 4 }}
spec:
  replicas: {{ .Values.guardrailsService.kafka.replicas }}
  selector:
    matchLabels:
      {{- include "akto-ai-guardrails-v2.componentSelectorLabels" (list . "guardrails-service-kafka") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "akto-ai-guardrails-v2.componentSelectorLabels" (list . "guardrails-service-kafka") | nindent 8 }}
