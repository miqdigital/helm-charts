{{- if .Values.redis.enabled }}
{{- if not .Values.redis.auth.existingSecret }}
{{- $secretName := printf "%s-redis-auth" (include "akto-ai-guardrails-v2.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "akto-ai-guardrails-v2.componentLabels" (list . "redis") | nindent 4 }}
type: Opaque
data:
  {{- if .Values.redis.auth.password }}
  {{ .Values.redis.auth.existingSecretKey }}: {{ .Values.redis.auth.password | b64enc }}
  {{- else if $existing }}
  {{ .Values.redis.auth.existingSecretKey }}: {{ index $existing.data .Values.redis.auth.existingSecretKey }}
  {{- else }}
  {{ .Values.redis.auth.existingSecretKey }}: {{ randAlphaNum 24 | b64enc }}
  {{- end }}
---
{{- end }}
{{- if .Values.redis.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "akto-ai-guardrails-v2.fullname" . }}-redis-data
  labels:
    {{- include "akto-ai-guardrails-v2.componentLabels" (list . "redis") | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.redis.persistence.storageClass }}
  storageClassName: {{ .Values.redis.persistence.storageClass | quote }}
  {{- else if .Values.global.storageClass }}
  storageClassName: {{ .Values.global.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.redis.persistence.size | quote }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "akto-ai-guardrails-v2.fullname" . }}-redis
  labels:
    {{- include "akto-ai-guardrails-v2.componentLabels" (list . "redis") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "akto-ai-guardrails-v2.componentSelectorLabels" (list . "redis") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "akto-ai-guardrails-v2.componentSelectorLabels" (list . "redis") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "akto-ai-guardrails-v2.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: redis
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
          - exec redis-stack-server --appendonly yes --requirepass "$(REDIS_PASSWORD)"
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "akto-ai-guardrails-v2.redis.secretName" . }}
              key: {{ .Values.redis.auth.existingSecretKey }}
        ports:
        - name: redis
          containerPort: 6379
          protocol: TCP
        livenessProbe:
          exec:
            command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          exec:
            command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        resources:
          {{- toYaml .Values.redis.resources | nindent 10 }}
        {{- if .Values.redis.persistence.enabled }}
        volumeMounts:
        - name: redis-data
          mountPath: /data
        {{- end }}
      {{- if .Values.redis.persistence.enabled }}
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: {{ include "akto-ai-guardrails-v2.fullname" . }}-redis-data
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "akto-ai-guardrails-v2.fullname" . }}-redis
  labels:
    {{- include "akto-ai-guardrails-v2.componentLabels" (list . "redis") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.redis.service.port }}
    targetPort: redis
    protocol: TCP
    name: redis
  selector:
    {{- include "akto-ai-guardrails-v2.componentSelectorLabels" (list . "redis") | nindent 4 }}
{{- end }}
