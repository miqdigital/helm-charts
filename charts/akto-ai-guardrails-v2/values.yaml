kubernetesClusterDomain: cluster.local

# Global settings
global:
  imagePullSecrets: []
  storageClass: ""

# Node scheduling shared by every component below
nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext: {}
securityContext: {}

# -----------------------------------------------------------------------------
# Azure Key Vault (via Secrets Store CSI Driver) - optional, mirrors the same
# pattern charts/akto-setup-dashboard uses for AKTO_MONGO_CONN. This chart
# never talks to Key Vault directly: you create a SecretProviderClass
# separately (pointing at your Key Vault + identity) with a `secretObjects`
# block that syncs the fetched values into a native Kubernetes Secret: this
# chart just mounts that SecretProviderClass (which triggers the sync) and
# reads the resulting Secret via secretKeyRef.
# -----------------------------------------------------------------------------
csiDriver:
  # Set to true to install the Secrets Store CSI Driver + Azure provider as
  # part of this chart. Leave false if already installed cluster-wide.
  install: false

# Values for the nested csi-secrets-store-provider-azure -> secrets-store-csi-driver
# dependency chain. syncSecret.enabled defaults to false upstream, which mounts
# the CSI volume fine but never creates the native Kubernetes Secrets our
# secretObjects blocks rely on (envFrom/secretKeyRef read those Secrets, not
# the CSI volume directly) - must be true for any of this chart's useKeyVault
# toggles to actually work.
csi-secrets-store-provider-azure:
  secrets-store-csi-driver:
    syncSecret:
      enabled: true

keyVault:
  # Name of the SecretProviderClass (created outside this chart) to mount
  # wherever a component below has useKeyVault/useKeyVaultForApiToken: true.
  secretProviderClass: akto-guardrails-keyvault

# -----------------------------------------------------------------------------
# 1. Data Ingestion Service
# Reused as a local chart dependency (alias "ingestion") rather than duplicated
# here. Anything under ingestion.dataIngestionService.* maps 1:1 onto that
# chart's own values.yaml (see charts/data-ingestion-service/values.yaml).
# By default it's pointed at the bundled guardrailsKafka broker below and
# produces onto the same topic guardrailsService.kafka consumes from, so HTTP
# traffic ingested here flows straight into the guardrails pipeline.
# -----------------------------------------------------------------------------
ingestion:
  enabled: true
  dataIngestionService:
    image:
      # Overrides the subchart's own pinned-digest default with :latest, scoped
      # to this stack only - charts/data-ingestion-service's own default.yaml
      # still uses the pinned digest unchanged for any other consumer.
      digest: ""
      tag: "latest"
    env:
      aktoKafkaTopicName: "akto.guardrails"
      # Points at the shared mini-runtime Kafka broker by default (same broker
      # guardrailsService.kafka consumes from below), so ingested traffic is
      # produced onto akto.guardrails there and flows into the guardrails
      # consumer. The bundled guardrailsKafka broker is disabled by default; if
      # you re-enable it and want to use it instead, set this to the
      # guardrails-kafka hostname printed in NOTES.txt, e.g.
      # "<release>-akto-ai-guardrails-v2-guardrails-kafka:9092".
      aktoKafkaBrokerUrl: "akto-mini-runtime-mini-runtime:9092"
      # This whole chart exists to run the guardrails pipeline, so guardrails
      # forwarding is on by default (the subchart itself defaults this off,
      # for when it's used standalone elsewhere).
      enableGuardrails: "true"
      # Left blank for the same reason as aktoKafkaBrokerUrl above - point
      # this at the guardrails-service-http hostname printed in NOTES.txt,
      # e.g. "http://<release>-akto-ai-guardrails-v2-guardrails-service-http:9091".
      guardrailsServiceUrl: ""
    service:
      type: LoadBalancer

# -----------------------------------------------------------------------------
# 2 & 3. Guardrails Service - same image (apps/guardrails-service, Go) deployed
# twice: once serving HTTP, once as a Kafka consumer (KAFKA_ENABLED=true).
# Env var names below are verified against the actual Go source
# (apps/guardrails-service/container/src/config.go) rather than assumed from
# the older akto-ai-guardrails chart - several differ from that chart's names.
# -----------------------------------------------------------------------------
guardrailsService:
  http:
    enabled: true
    replicas: 1
    image:
      repository: aktosecurity/guardrails-service
      tag: local
      pullPolicy: IfNotPresent
    service:
      type: LoadBalancer
      port: 9091
      targetPort: 9091
    env:
      databaseAbstractorServiceUrl: "https://cyborg.akto.io"
      databaseAbstractorServiceToken: ""
      # If true, DATABASE_ABSTRACTOR_SERVICE_TOKEN is sourced via secretKeyRef
      # from dbTokenSecretName/dbTokenSecretKey (synced by the
      # SecretProviderClass named in keyVault.secretProviderClass) instead of
      # the plain value above.
      useKeyVaultForDbToken: false
      dbTokenSecretName: "akto-guardrails-db-abstractor-token"
      dbTokenSecretKey: "DATABASE_ABSTRACTOR_SERVICE_TOKEN"
      # JWT verification key - optional, plain value (this is a PUBLIC key by
      # design, not a credential, despite living alongside secrets here).
      rsaPublicKey: ""
      # Where guardrails-service calls agent-guard's /scan. Left blank =
      # defaults to the bundled agent-guard executor Service (see agent-guard.yaml).
      scannerApiUrl: ""
      nhiEnabled: "true"
      nhiScanIntervalMin: "30"
      # Semantic cache in front of agent-guard's /scan - fail-open, so REDIS_URL/
      # EMBEDDER_URL are only emitted when the matching component is enabled or
      # an explicit override is given; CACHE_MODE alone is safe to leave set
      # even if redis/embedder aren't running (just becomes cache misses).
      cacheMode: "decide"
      redisUrl: ""
      embedderUrl: ""
      scanTimeoutSec: "40"
      guardrailsValidationTimeoutMs: "40000"
      guardrailsSkipPaths: ""
      logLevel: info
      # URL of the threat backend the guardrails service reports to. Leave
      # blank to use the app default (https://tbs.akto.io); set to your own
      # self-hosted threat backend, e.g.
      # http://akto-threat-backend-threat-backend.<namespace>.svc.cluster.local:9090
      threatBackendUrl: ""
      # Full URL (including path) the guardrails service POSTs blocked/malicious
      # events to. Leave blank for the app default
      # (https://tbs.akto.io/api/threat_detection/record_malicious_event); set to
      # your own threat backend, e.g.
      # http://akto-threat-backend-threat-backend.<namespace>.svc.cluster.local:9090/api/threat_detection/record_malicious_event
      # NOTE: distinct from threatBackendUrl above — that only controls session
      # sync; this one controls malicious-event reporting (record_malicious_event).
      threatDetectionApiUrl: ""
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2
        memory: 2Gi
    livenessProbe:
      enabled: true
      httpGet:
        path: /health
        port: 9091
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      enabled: true
      httpGet:
        path: /health
        port: 9091
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3

  kafka:
    enabled: true
    replicas: 1
    image:
      repository: aktosecurity/guardrails-service
      tag: local
      pullPolicy: IfNotPresent
    env:
      # Defaults to the shared mini-runtime Kafka broker (same hostname
      # convention the data-ingestion-service chart uses). The bundled
      # guardrailsKafka broker is disabled by default; if you re-enable it and
      # want to use it instead, set this back to "" (blank = bundled broker).
      kafkaBrokerUrl: "akto-mini-runtime-mini-runtime:9092"
      kafkaTopic: "akto.guardrails"
      kafkaGroupId: "guardrails-service"
      kafkaBatchSize: "100"
      kafkaBatchLingerSec: "5"
      databaseAbstractorServiceUrl: "https://cyborg.akto.io"
      databaseAbstractorServiceToken: ""
      useKeyVaultForDbToken: false
      dbTokenSecretName: "akto-guardrails-db-abstractor-token"
      dbTokenSecretKey: "DATABASE_ABSTRACTOR_SERVICE_TOKEN"
      rsaPublicKey: ""
      scannerApiUrl: ""
      nhiEnabled: "true"
      nhiScanIntervalMin: "30"
      cacheMode: "decide"
      redisUrl: ""
      embedderUrl: ""
      scanTimeoutSec: "40"
      guardrailsValidationTimeoutMs: "40000"
      guardrailsSkipPaths: ""
      logLevel: info
      # URL of the threat backend the guardrails service reports to. Leave
      # blank to use the app default (https://tbs.akto.io); set to your own
      # self-hosted threat backend, e.g.
      # http://akto-threat-backend-threat-backend.<namespace>.svc.cluster.local:9090
      threatBackendUrl: ""
      # Full URL (including path) the guardrails service POSTs blocked/malicious
      # events to. Leave blank for the app default
      # (https://tbs.akto.io/api/threat_detection/record_malicious_event); set to
      # your own threat backend, e.g.
      # http://akto-threat-backend-threat-backend.<namespace>.svc.cluster.local:9090/api/threat_detection/record_malicious_event
      # NOTE: distinct from threatBackendUrl above — that only controls session
      # sync; this one controls malicious-event reporting (record_malicious_event).
      threatDetectionApiUrl: ""
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2
        memory: 2Gi

# -----------------------------------------------------------------------------
# 4. Guardrails Kafka - dedicated single-broker Kafka + Zookeeper for the
# guardrails pipeline. Set enabled: false and point the URLs above at an
# existing cluster if you'd rather bring your own broker.
# -----------------------------------------------------------------------------
guardrailsKafka:
  enabled: false
  image:
    # Matches the mini-runtime Kafka image/version (charts/mini-runtime).
    # Runs in KRaft mode (no Zookeeper) - see templates/guardrails-kafka.yaml.
    repository: public.ecr.aws/aktosecurity/confluentinc-cp-kafka
    tag: "8.2.2-1-ubi9"
  # KRaft cluster id used to format the broker's storage on first start. Any
  # valid base64-url uuid works; change it only for a fresh cluster (changing
  # it against existing persisted data will fail to start).
  clusterId: "c6a1b8e2-4f2a-4b2a-9c3f-1a2b3c4d5e6f"
  createTopics: "akto.guardrails:3:1"
  logRetentionHours: "5"
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1
      memory: 2Gi

# -----------------------------------------------------------------------------
# 5. Redis - dedicated redis-stack-server instance backing Agent Guard's
# semantic cache. Must stay redis-stack-server (not plain redis/redis): the
# cache needs the RediSearch module (FT.* commands).
# -----------------------------------------------------------------------------
redis:
  enabled: true
  image:
    repository: redis/redis-stack-server
    tag: "7.4.0-v1"
  auth:
    # Leave both blank to auto-generate a password into a chart-managed Secret.
    # Set existingSecret/existingSecretKey to bring your own instead.
    password: ""
    existingSecret: ""
    existingSecretKey: "redis-password"
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 2Gi
  service:
    port: 6379

# -----------------------------------------------------------------------------
# 6. Embedder - model sidecar used by Agent Guard's semantic cache
# -----------------------------------------------------------------------------
embedder:
  enabled: true
  replicas: 1
  image:
    repository: aktosecurity/akto-agent-guard-embedder
    tag: local
    pullPolicy: IfNotPresent
  service:
    port: 8094
    targetPort: 8094
  resources:
    requests:
      cpu: 1
      memory: 2Gi
    limits:
      cpu: 2
      memory: 4Gi
  livenessProbe:
    enabled: true
    httpGet:
      path: /health
      port: 8094
    initialDelaySeconds: 60
    periodSeconds: 20
    timeoutSeconds: 15
    failureThreshold: 5
  readinessProbe:
    enabled: true
    httpGet:
      path: /health
      port: 8094
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 5

# -----------------------------------------------------------------------------
# 7. Anonymizer - PII masking sidecar used by Agent Guard
# -----------------------------------------------------------------------------
anonymizer:
  enabled: true
  replicas: 1
  image:
    repository: aktosecurity/akto-agent-guard-anonymizer
    tag: local
    pullPolicy: IfNotPresent
  env:
    spacyModel: "en_core_web_sm"
  service:
    port: 8093
    targetPort: 8093
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1
      memory: 2Gi
  livenessProbe:
    enabled: true
    httpGet:
      path: /health
      port: 8093
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 10
  readinessProbe:
    enabled: true
    httpGet:
      path: /health
      port: 8093
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5

# -----------------------------------------------------------------------------
# Agent Guard (executor) - runs the guardrail scanners, calling out to the
# anonymizer for PII masking. This is the "agent guard" component. The
# semantic cache (redis + embedder) sits in front of this at the
# guardrails-service level, not here - see guardrailsService.*.env above.
# -----------------------------------------------------------------------------
agentGuard:
  enabled: true
  replicas: 1
  image:
    repository: aktosecurity/akto-agent-guard-worker
    tag: local
    pullPolicy: IfNotPresent
  service:
    port: 8090
    targetPort: 8090
  env:
    databaseAbstractorServiceUrl: ""
    slackWebhookUrl: ""
  # Model-provider credentials, injected via a chart-managed Secret by
  # default. Leave a field blank to skip that provider - never commit real
  # values here, pass them with -f custom-values.yaml or --set at install time.
  secrets:
    # If true, skip creating the chart-managed Secret entirely and instead
    # read all the fields below from existingSecretName, which must already
    # contain the same keys (QWEN3GUARD_*, GEMMA_VERTEX_*, *_FOUNDRY_*,
    # ANTHROPIC_*, OPENAI_*, DEFAULT_MODEL_CONFIG_JSON) - synced there by the
    # SecretProviderClass named in keyVault.secretProviderClass.
    useKeyVault: false
    existingSecretName: "akto-guardrails-agent-guard-secrets"
    qwen3guardSaKeyJson: ""
    qwen3guardProject: ""
    qwen3guardLocation: ""
    qwen3guardEndpointId: ""
    qwen3guardDedicatedDns: ""
    gemmaVertexSaKeyJson: ""
    gemmaVertexProject: ""
    gemmaVertexLocation: ""
    gemmaVertexEndpointId: ""
    gemmaVertexDedicatedDns: ""
    # Azure AI Foundry alternative to the Vertex endpoints above (managed
    # compute / OpenAI-compatible). BaseUrl + apiKey required per provider;
    # deployment (azureml-model-deployment header) and model are optional.
    qwen3guardFoundryBaseUrl: ""
    qwen3guardFoundryApiKey: ""
    qwen3guardFoundryDeployment: ""
    qwen3guardFoundryModel: ""
    gemmaFoundryBaseUrl: ""
    gemmaFoundryApiKey: ""
    gemmaFoundryDeployment: ""
    gemmaFoundryModel: ""
    azureFoundryBaseUrl: ""
    azureFoundryApiKey: ""
    azureFoundryDeployment: ""
    azureFoundryModel: ""
    anthropicFoundryBaseUrl: ""
    anthropicFoundryApiKey: ""
    anthropicFoundryDeployment: ""
    anthropicFoundryModel: ""
    anthropicApiKey: ""
    anthropicModel: ""
    openaiApiKey: ""
    openaiModel: ""
    openaiCompatibleBaseUrl: ""
    defaultModelConfigJson: ""
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 2Gi
  livenessProbe:
    enabled: true
    httpGet:
      path: /health
      port: 8090
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 5
  readinessProbe:
    enabled: true
    httpGet:
      path: /health
      port: 8090
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5
