kubernetesClusterDomain: cluster.local

# Busybox image for init containers
busybox:
  image:
    repository: busybox
    digest: sha256:b3255e7dfbcd10cb367af0d409747d511aeb66dfac98cf30e97e87e4207dd76f

# Node scheduling configuration
nodeSelector: {}
  # Example usage:
  # nodetype: coreservices

tolerations: []
  # Example usage:
  # - key: nodetype
  #   operator: Equal
  #   value: coreservices
  #   effect: NoSchedule

affinity: {}
  # Example usage:
  # nodeAffinity:
  #   requiredDuringSchedulingIgnoredDuringExecution:
  #     nodeSelectorTerms:
  #     - matchExpressions:
  #       - key: nodetype
  #         operator: In
  #         values:
  #         - coreservices

dataIngestionService:
  image:
    repository: aktosecurity/data-ingestion-service
    digest: "sha256:213aded7adc54b809bbd887d85dfc028eaca95fe296190d8f9d1926395631f2b"
  imagePullPolicy: Always

  env:
    aktoTrafficBatchSize: "100"
    aktoTrafficBatchTimeSecs: "10"
    aktoKafkaBrokerUrl: akto-mini-runtime-mini-runtime:9092
    aktoKafkaProducerBatchSize: "10"
    aktoKafkaProducerLingerMs: "10"
    aktoKafkaTopicName: "akto.api.logs"
    aktoLogLevel: "WARN"
    # Guardrails integration - all optional, off by default so standalone
    # (non-guardrails) deployments of this chart are unaffected.
    enableGuardrails: "false"
    # Blank = guardrails integration stays off regardless of enableGuardrails.
    # When installed as part of akto-ai-guardrails-v2, this is set explicitly
    # by that parent chart's values (subchart values aren't templated, so it
    # can't be auto-defaulted here).
    guardrailsServiceUrl: ""
    guardrailsClientTimeoutMs: "5000"
    databaseAbstractorServiceUrl: ""
    runtimeMode: ""
    aktoDiAuthenticate: "false"
    # JWT verification key - optional, plain value (this is a PUBLIC key by
    # design, not a credential).
    rsaPublicKey: ""

  # Sensitive fields, injected via a chart-managed Secret by default. Leave a
  # field blank to skip it - never commit real values here, pass them with
  # -f custom-values.yaml or --set at install time.
  secrets:
    # If true, skip creating the chart-managed Secret entirely and instead
    # read the fields below from existingSecretName, which must already
    # contain the same keys (DATABASE_ABSTRACTOR_SERVICE_TOKEN,
    # AKTO_DI_REVOKED_TOKENS) - synced there by a SecretProviderClass (Azure
    # Key Vault via the Secrets Store CSI Driver). This chart doesn't install
    # the CSI driver itself - install it separately, or via the parent
    # chart's csiDriver.install if using akto-ai-guardrails-v2.
    useKeyVault: false
    existingSecretName: "akto-data-ingestion-secrets"
    secretProviderClass: "akto-guardrails-keyvault"
    databaseAbstractorServiceToken: ""
    # Comma-separated list of tokens that must never be allowed to authenticate.
    aktoDiRevokedTokens: ""

  resources:
    requests:
      cpu: 500m
      memory: "512Mi"
    limits:
      cpu: 1
      memory: "1Gi"

  replicas: 1

  service:
    type: LoadBalancer
    port: 8080
    targetPort: 8080
    internal: true
    # Comma-separated subnet IDs, e.g., "subnet-xxx,subnet-yyy,subnet-zzz"
    subnets: ""

  restartPolicy: Always

  # Kafka SASL Authentication
  useSasl: false  # Set to true to enable SASL authentication

  kafka:
    saslMechanism: "SCRAM-SHA-256"
    saslUsername: ""
    saslPassword: ""
    # Security protocol: SASL_PLAINTEXT or SASL_SSL (for MSK/TLS)
    securityProtocol: "SASL_PLAINTEXT"

    useSecretsForSaslCredentials: false
    saslCredentialsSecrets:
      existingSecret: "akto-mini-runtime-mini-runtime-sasl"  # Name of existing secret of mini-runtime (e.g., "akto-kafka-sasl")
      username: ""  
      password: ""  