{{- if not .Values.dataIngestionService.secrets.useKeyVault }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "data-ingestion-service.fullname" . }}-secrets
  labels:
    {{- include "data-ingestion-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_ABSTRACTOR_SERVICE_TOKEN: {{ .Values.dataIngestionService.secrets.databaseAbstractorServiceToken | quote }}
  AKTO_DI_REVOKED_TOKENS: {{ .Values.dataIngestionService.secrets.aktoDiRevokedTokens | quote }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "data-ingestion-service.fullname" . }}
  labels:
    {{- include "data-ingestion-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dataIngestionService.replicas }}
  selector:
    matchLabels:
      {{- include "data-ingestion-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "data-ingestion-service.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: {{ .Values.dataIngestionService.restartPolicy }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.dataIngestionService.useSasl }}
      initContainers:
      - name: generate-jaas-config
        image: {{ .Values.busybox.image.repository }}@{{ .Values.busybox.image.digest }}
        command: ["/bin/sh", "-c"]
        args:
          - |
            mkdir -p /etc/kafka/secrets
            {{- if eq .Values.dataIngestionService.kafka.saslMechanism "PLAIN" }}
            cat > /etc/kafka/secrets/kafka_client_jaas.conf <<EOF
            KafkaClient {
              org.apache.kafka.common.security.plain.PlainLoginModule required
              username="${AKTO_KAFKA_USERNAME}"
              password="${AKTO_KAFKA_PASSWORD}";
            };
            EOF
            {{- else }}
            cat > /etc/kafka/secrets/kafka_client_jaas.conf <<EOF
            KafkaClient {
              org.apache.kafka.common.security.scram.ScramLoginModule required
              username="${AKTO_KAFKA_USERNAME}"
              password="${AKTO_KAFKA_PASSWORD}";
            };
            EOF
            {{- end }}
            echo "Kafka client JAAS config generated successfully"
        env:
        {{- if .Values.dataIngestionService.kafka.useSecretsForSaslCredentials }}
        - name: AKTO_KAFKA_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.dataIngestionService.kafka.saslCredentialsSecrets.existingSecret }}
              key: {{ .Values.dataIngestionService.kafka.saslCredentialsSecrets.username }}
        - name: AKTO_KAFKA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.dataIngestionService.kafka.saslCredentialsSecrets.existingSecret }}
              key: {{ .Values.dataIngestionService.kafka.saslCredentialsSecrets.password }}
        {{- else }}
        - name: AKTO_KAFKA_USERNAME
          value: {{ quote .Values.dataIngestionService.kafka.saslUsername }}
        - name: AKTO_KAFKA_PASSWORD
          value: {{ quote .Values.dataIngestionService.kafka.saslPassword }}
        {{- end }}
        volumeMounts:
        - name: kafka-jaas-config
          mountPath: /etc/kafka/secrets
      {{- end }}
      containers:
      - name: data-ingestion-service
        {{- if .Values.dataIngestionService.image.digest }}
        image: "{{ .Values.dataIngestionService.image.repository }}@{{ .Values.dataIngestionService.image.digest }}"
        {{- else }}
        image: "{{ .Values.dataIngestionService.image.repository }}:{{ .Values.dataIngestionService.image.tag | default "latest" }}"
        {{- end }}
        imagePullPolicy: {{ .Values.dataIngestionService.imagePullPolicy }}
        ports:
        - containerPort: {{ .Values.dataIngestionService.service.targetPort }}
          protocol: TCP
        envFrom:
        - secretRef:
            name: {{ if .Values.dataIngestionService.secrets.useKeyVault }}{{ .Values.dataIngestionService.secrets.existingSecretName }}{{ else }}{{ include "data-ingestion-service.fullname" . }}-secrets{{ end }}
        env:
        - name: AKTO_TRAFFIC_BATCH_SIZE
          value: {{ quote .Values.dataIngestionService.env.aktoTrafficBatchSize }}
        - name: AKTO_TRAFFIC_BATCH_TIME_SECS
          value: {{ quote .Values.dataIngestionService.env.aktoTrafficBatchTimeSecs }}
        - name: AKTO_KAFKA_BROKER_URL
          value: {{ quote .Values.dataIngestionService.env.aktoKafkaBrokerUrl }}
        - name: AKTO_KAFKA_PRODUCER_BATCH_SIZE
          value: {{ quote .Values.dataIngestionService.env.aktoKafkaProducerBatchSize }}
        - name: AKTO_KAFKA_PRODUCER_LINGER_MS
          value: {{ quote .Values.dataIngestionService.env.aktoKafkaProducerLingerMs }}
        - name: AKTO_KAFKA_TOPIC_NAME
          value: {{ quote .Values.dataIngestionService.env.aktoKafkaTopicName }}
        - name: AKTO_LOG_LEVEL
          value: {{ quote .Values.dataIngestionService.env.aktoLogLevel }}
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        - name: ENABLE_GUARDRAILS
          value: {{ quote .Values.dataIngestionService.env.enableGuardrails }}
        {{- if .Values.dataIngestionService.env.guardrailsServiceUrl }}
        - name: GUARDRAILS_SERVICE_URL
          value: {{ quote .Values.dataIngestionService.env.guardrailsServiceUrl }}
        {{- end }}
        - name: GUARDRAILS_CLIENT_TIMEOUT_MS
          value: {{ quote .Values.dataIngestionService.env.guardrailsClientTimeoutMs }}
        {{- if .Values.dataIngestionService.env.databaseAbstractorServiceUrl }}
        - name: DATABASE_ABSTRACTOR_SERVICE_URL
          value: {{ quote .Values.dataIngestionService.env.databaseAbstractorServiceUrl }}
        {{- end }}
        {{- if .Values.dataIngestionService.env.runtimeMode }}
        - name: RUNTIME_MODE
          value: {{ quote .Values.dataIngestionService.env.runtimeMode }}
        {{- end }}
        - name: AKTO_DI_AUTHENTICATE
          value: {{ quote .Values.dataIngestionService.env.aktoDiAuthenticate }}
        {{- if .Values.dataIngestionService.env.rsaPublicKey }}
        - name: RSA_PUBLIC_KEY
          value: {{ quote .Values.dataIngestionService.env.rsaPublicKey }}
        {{- end }}
        {{- if .Values.dataIngestionService.useSasl }}
        - name: KAFKA_OPTS
          value: "-Djava.security.auth.login.config=/etc/kafka/secrets/kafka_client_jaas.conf"
        - name: AKTO_KAFKA_SASL_ENABLED
          value: "true"
        - name: AKTO_KAFKA_SASL_MECHANISM
          value: {{ quote .Values.dataIngestionService.kafka.saslMechanism }}
        - name: AKTO_KAFKA_SECURITY_PROTOCOL
          value: {{ quote (.Values.dataIngestionService.kafka.securityProtocol | default "SASL_PLAINTEXT") }}
        {{- if and .Values.dataIngestionService.useSasl .Values.dataIngestionService.kafka.useSecretsForSaslCredentials }}
        - name: AKTO_KAFKA_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.dataIngestionService.kafka.saslCredentialsSecrets.existingSecret }}
              key: {{ .Values.dataIngestionService.kafka.saslCredentialsSecrets.username }}
        - name: AKTO_KAFKA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.dataIngestionService.kafka.saslCredentialsSecrets.existingSecret }}
              key: {{ .Values.dataIngestionService.kafka.saslCredentialsSecrets.password }}
        {{- else }}
        - name: AKTO_KAFKA_USERNAME
          value: {{ quote .Values.dataIngestionService.kafka.saslUsername }}
        - name: AKTO_KAFKA_PASSWORD
          value: {{ quote .Values.dataIngestionService.kafka.saslPassword }}
        {{- end }}
        {{- end }}
        resources:
          {{- toYaml .Values.dataIngestionService.resources | nindent 10 }}
        {{- if or .Values.dataIngestionService.useSasl .Values.dataIngestionService.secrets.useKeyVault }}
        volumeMounts:
        {{- if .Values.dataIngestionService.useSasl }}
        - name: kafka-jaas-config
          mountPath: /etc/kafka/secrets
        {{- end }}
        {{- if .Values.dataIngestionService.secrets.useKeyVault }}
        - name: secrets-store
          mountPath: /mnt/secrets-store
          readOnly: true
        {{- end }}
        {{- end }}
      {{- if or .Values.dataIngestionService.useSasl .Values.dataIngestionService.secrets.useKeyVault }}
      volumes:
      {{- if .Values.dataIngestionService.useSasl }}
      - name: kafka-jaas-config
        emptyDir: {}
      {{- end }}
      {{- if .Values.dataIngestionService.secrets.useKeyVault }}
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: {{ .Values.dataIngestionService.secrets.secretProviderClass }}
      {{- end }}
      {{- end }}
