mongo:
  aktoMongoConn: ""
  # Set to false to pass the connection string directly via aktoMongoConn above.
  useKeyVault: true
  secretName: akto-secrets
  secretKey: aktoMongoConn
  secretProviderClass: akto-keyvault

elasticsearch:
  # Backs the dashboard's agentic-session/prompt search (LLMObservabilityAction,
  # UserAnalysisCron) with Elasticsearch instead of Mongo aggregations. This is
  # the dashboard process that actually calls ElasticSearchClient - not
  # database-abstractor. ELASTICSEARCH (default) or AZURE_ADX. Leave esHost
  # empty to disable Elasticsearch-backed features entirely (they no-op when
  # unset).
  searchBackend: "ELASTICSEARCH"
  esHost: ""
  # Fixed default index name; override only if your cluster uses a different one.
  indexAgentQuery: "agent_query_logs"
  esApiKey: ""
  # Set to false to read ES_HOST/ES_API_KEY from the plain esHost/esApiKey
  # values above instead of a K8s Secret synced via the Azure Key Vault CSI
  # driver. Defaults to true (Key Vault), matching mongo.useKeyVault above.
  useKeyVault: true
  secretName: akto-secrets
  esHostSecretKey: esHost
  esApiKeySecretKey: esApiKey
  secretProviderClass: akto-keyvault

onPrem:
  # Set to false for local_deploy mode.
  enabled: true

csiDriver:
  # Set to true to install Azure Key Vault CSI drivers as part of this chart.
  # Set to false if CSI drivers are already installed cluster-wide.
  install: false

dashboard:
  aktoApiSecurityDashboard:
    env:
      aktoAccountName: Helios
      aktoConfigName: staging
      aktoInstanceType: DASHBOARD
      aktoKafkaBrokerMal: localhost:29092
      aktoKafkaBrokerUrl: 127.0.0.1:29092
      aktoKafkaGroupIdConfig: asdf
      aktoKafkaMaxPollRecordsConfig: "100"
      aktoKafkaTopicName: akto.api.logs
      aktoTrafficBatchSize: "100"
      aktoTrafficBatchTimeSecs: "10"
      puppeteerReplayServiceUrl: http://akto-puppeteer-replay:3000
      # URL of the threat detection backend service. Override to point at a
      # self-hosted akto-threat-backend deployment instead of Akto's SaaS backend.
      threatDetectionBackendUrl: https://tbs.akto.io
    image:
      repository: aktosecurity/akto-api-security-dashboard
      tag: latest
    imagePullPolicy: Always
    resources:
      requests:
        cpu: 1
        memory: "4Gi"
      limits:
        cpu: 2
        memory: "8Gi"
  ports:
  - port: 8080
    targetPort: 8080
  replicas: 1
  type: LoadBalancer

testing:
  # Set to true to deploy the testing service alongside the dashboard.
  enabled: false
  aktoApiSecurityTesting:
    env:
      aktoAccountName: Helios
      aktoConfigName: staging
      aktoInstanceType: DASHBOARD
      aktoKafkaBrokerMal: localhost:29092
      aktoKafkaBrokerUrl: kafka1:19092
      aktoKafkaGroupIdConfig: asdf
      aktoKafkaMaxPollRecordsConfig: "100"
      aktoKafkaTopicName: akto.api.logs
      aktoTrafficBatchSize: "100"
      aktoTrafficBatchTimeSecs: "10"
      puppeteerReplayServiceUrl: http://akto-puppeteer-replay:3000
    image:
      repository: public.ecr.aws/aktosecurity/akto-api-testing
      tag: latest
    imagePullPolicy: Always
    resources:
      requests:
        cpu: 1
        memory: "4Gi"
      limits:
        cpu: 2
        memory: "8Gi"
  replicas: 1

keel:
  # Set to true to also deploy Keel for auto image updates.
  enabled: false
  keel:
    env:
      awsAccessKeyId: ""
      awsRegion: ""
      awsSecretAccessKey: ""
      hipchatApprovalsBotName: ""
      hipchatApprovalsChannel: ""
      hipchatApprovalsPasswort: ""
      hipchatApprovalsUserName: ""
      hipchatChannels: ""
      hipchatToken: ""
      insecureRegistry: "true"
      mattermostEndpoint: ""
      notificationLevel: info
      webhookEndpoint: ""
    image:
      repository: keelhq/keel
      tag: latest
    imagePullPolicy: Always
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
  maxUnavailable: 1
  ports:
  - name: keel
    port: 9300
    protocol: TCP
    targetPort: 9300
  replicas: 1
  serviceAccount:
    annotations: {}
  type: LoadBalancer

kubernetesClusterDomain: cluster.local
