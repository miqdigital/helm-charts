mongo:
  aktoMongoConn: ""
  # Set to false to read AKTO_MONGO_CONN from the plain aktoMongoConn value
  # above instead of a K8s Secret synced via the Azure Key Vault CSI driver.
  # Defaults to true (Key Vault) since that's the recommended production path;
  # complete the "Deploy with Azure Key Vault" setup before installing, or set
  # this to false for a quick plaintext install.
  useKeyVault: true
  secretName: akto-secrets
  secretKey: aktoMongoConn
  secretProviderClass: akto-keyvault

elasticsearch:
  # ELASTICSEARCH (default) or AZURE_ADX. Leave esHost empty to disable
  # Elasticsearch-backed features entirely (they no-op when unset).
  searchBackend: "ELASTICSEARCH"
  esHost: ""
  # Fixed default index name; override only if your cluster uses a different one.
  indexAgentQuery: "agent_query_logs"
  esApiKey: ""
  # Set to false to read ES_HOST/ES_API_KEY from the plain esHost/esApiKey
  # values above instead of a K8s Secret synced via the Azure Key Vault CSI
  # driver. Defaults to true (Key Vault), matching mongo.useKeyVault above.
  useKeyVault: true
  secretName: akto-secrets
  esHostSecretKey: esHost
  esApiKeySecretKey: esApiKey
  secretProviderClass: akto-keyvault

database_abstractor:
  aktoApiSecurityDatabaseAbstractor:
    env:
      aktoAccountName: Helios
      aktoConfigName: staging
      aktoInstanceType: DASHBOARD
    image:
      repository: public.ecr.aws/aktosecurity/akto-api-security-database-abstractor
      tag: latest
    imagePullPolicy: Always
    resources:
      requests:
        cpu: 1
        memory: "4Gi"
      limits:
        cpu: 2
        memory: "8Gi"
  ports:
  - port: 9000
    targetPort: 8080
  replicas: 1
  type: LoadBalancer
kubernetesClusterDomain: cluster.local

keel:
  keel:
    env:
      awsAccessKeyId: ""
      awsRegion: ""
      awsSecretAccessKey: ""
      hipchatApprovalsBotName: ""
      hipchatApprovalsChannel: ""
      hipchatApprovalsPasswort: ""
      hipchatApprovalsUserName: ""
      hipchatChannels: ""
      hipchatToken: ""
      insecureRegistry: "true"
      mattermostEndpoint: ""
      notificationLevel: info
      webhookEndpoint: ""
    image:
      repository: keelhq/keel
      tag: latest
    imagePullPolicy: Always
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
  maxUnavailable: 1
  ports:
  - name: keel
    port: 9300
    protocol: TCP
    targetPort: 9300
  replicas: 1
  serviceAccount:
    annotations: {}
  type: LoadBalancer
