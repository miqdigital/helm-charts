kubernetesClusterDomain: cluster.local

# Azure Key Vault (via the CSI driver) for pulling secrets instead of plain
# values or a pre-existing K8s Secret. Set enabled: true and point
# secretProviderClass at your SecretProviderClass; secretKeys maps each
# secret to the key name inside the Key Vault-synced K8s Secret.
keyVault:
  enabled: false
  secretName: akto-secrets
  secretProviderClass: akto-keyvault
  secretKeys:
    databaseAbstractorToken: databaseAbstractorToken
    postgresUser: postgresUser
    postgresPassword: postgresPassword
    kafkaSaslUsername: kafkaSaslUsername
    kafkaSaslPassword: kafkaSaslPassword

# Busybox image for init containers
busybox:
  image:
    repository: busybox
    digest: sha256:b3255e7dfbcd10cb367af0d409747d511aeb66dfac98cf30e97e87e4207dd76f

# Node scheduling configuration
nodeSelector: {}
  # Example usage:
  # nodetype: coreservices

tolerations: []
  # Example usage:
  # - key: nodetype
  #   operator: Equal
  #   value: coreservices
  #   effect: NoSchedule

affinity: {}
  # Example usage:
  # nodeAffinity:
  #   requiredDuringSchedulingIgnoredDuringExecution:
  #     nodeSelectorTerms:
  #     - matchExpressions:
  #       - key: nodetype
  #         operator: In
  #         values:
  #         - coreservices

threat_client:
  # External Kafka Configuration
  # Set useExternalKafka to true to have this threat client read from an
  # existing Kafka cluster (e.g. the one bundled with an akto-mini-runtime
  # install) instead of the Kafka broker bundled in this chart.
  useExternalKafka: false
  externalKafka:
    # Kafka broker URL (e.g. <mini-runtime-release>-mini-runtime.<namespace>.svc.cluster.local:9092)
    brokerUrl: ""
    # SASL authentication (leave empty for no authentication)
    username: ""
    password: ""
    # SASL mechanism for external Kafka: PLAIN, SCRAM-SHA-256, or SCRAM-SHA-512
    saslMechanism: "SCRAM-SHA-256"
    # SSL/TLS configuration for external Kafka
    useSsl: false
    # Security protocol: PLAINTEXT, SASL_PLAINTEXT, SASL_SSL, SSL
    securityProtocol: "SASL_SSL"

  replicas: 1

  aktoApiSecurityThreatClient:
    env:
      enabled: true
      postgresUrl: jdbc:postgresql://postgres.default.svc.cluster.local:5432/akto
      postgresUser: akto
      postgresPassword: akto
      aktoAccountName: Helios
      aktoConfigName: staging
      aktoInstanceType: DASHBOARD
      backendUrl: https://tbs.akto.io
      aktoLogLevel: INFO
      useHostName: true
      databaseAbstractorUrl: https://cyborg.akto.io
      # If you want to use secrets to store the database abstractor token. default: false
      useSecretsForDatabaseAbstractorToken: false
      # If not using secrets, place token here.
      databaseAbstractorToken: ""
      # If using secrets, place token here.
      databaseAbstractorTokenSecrets:
        # Name of an existing secret containing the Database Abstractor Token
        existingSecret: ""
        # Token to use if existingSecret is not provided
        token: ""
    image:
      repository: public.ecr.aws/aktosecurity/akto-threat-detection
      tag: latest
    imagePullPolicy: Always
    resources:
      requests:
        cpu: 1.5
        memory: "2Gi"
      limits:
        cpu: 1.5
        memory: "2.5Gi"

  kafka1:
    env:
      # add advertised listeners if you want to override the default listeners
      kafkaAdvertisedListeners: ""
      kafkaBrokerId: "1"
      kafkaCleanupPolicy: delete
      kafkaCreateTopics: akto.threat_detection.alerts:3:3
      kafkaInterBrokerListenerName: LISTENER_DOCKER_EXTERNAL_LOCALHOST
      kafkaListenerSecurityProtocolMap: CONTROLLER:PLAINTEXT,LISTENER_DOCKER_EXTERNAL_LOCALHOST:PLAINTEXT,LISTENER_DOCKER_EXTERNAL_DIFFHOST:PLAINTEXT
      kafkaListenerSecurityProtocolMapSsl: CONTROLLER:PLAINTEXT,LISTENER_DOCKER_EXTERNAL_LOCALHOST:PLAINTEXT,LISTENER_DOCKER_EXTERNAL_DIFFHOST:PLAINTEXT,LISTENER_DOCKER_EXTERNAL_DIFFHOST_ENCRYPTED:SSL
      kafkaListenerSecurityProtocolMapSasl: CONTROLLER:PLAINTEXT,LISTENER_DOCKER_EXTERNAL_DIFFHOST_SASL:SASL_PLAINTEXT,LISTENER_DOCKER_EXTERNAL_LOCALHOST_SASL:SASL_PLAINTEXT,LISTENER_DOCKER_EXTERNAL_LOCALHOST:SASL_PLAINTEXT,LISTENER_DOCKER_EXTERNAL_DIFFHOST:SASL_PLAINTEXT
      kafkaListenerSecurityProtocolMapSaslTls: CONTROLLER:PLAINTEXT,LISTENER_DOCKER_EXTERNAL_DIFFHOST_SASL:SASL_SSL,LISTENER_DOCKER_EXTERNAL_LOCALHOST_SASL:SASL_PLAINTEXT
      kafkaProcessRoles: "broker,controller"
      kafkaNodeId: "1"
      kafkaControllerQuorumVoters: "1@localhost:9094"
      kafkaControllerListenerNames: "CONTROLLER"
      kafkaListeners: ""
      kafkaLogCleanerEnable: "true"
      kafkaLogRetentionBytes: "10737418240"
      kafkaLogRetentionCheckIntervalMs: "60000"
      kafkaLogRetentionHours: "5"
      kafkaLogSegmentBytes: "104857600"
      kafkaOffsetsTopicReplicationFactor: "1"
      kafkaTransactionStateLogMinIsr: "1"
      kafkaTransactionStateLogReplicationFactor: "1"
      kafkaClusterId: "a1b2c3d4-5e6f-4a1b-8c2d-3e4f5a6b7c8d"
      sslKeystoreLocation: "/etc/kafka/ssl/secrets/server.keystore.jks"
      sslKeystorePassword: "password"
      sslKeyPassword: "password"
      sslTruststoreLocation: "/etc/kafka/ssl/secrets/server.truststore.jks"
      sslTruststorePassword: "password"
      sslBaseMountPath: "/etc/kafka/ssl/secrets"
      sslSecretName: "kafka-certs"
      useSecretsForSaslCredentials: false
      saslCredentialsSecrets:
        existingSecret: ""
        username: ""
        password: ""
      saslUsername: ""
      saslPassword: ""
      # SASL mechanism: PLAIN, SCRAM-SHA-256, or SCRAM-SHA-512
      saslMechanism: "SCRAM-SHA-512"
    useTls: false
    useSasl: false
    # Auto-format storage with SCRAM on first deployment (single helm install)
    # Requires persistence.enabled: true
    autoFormatWithScram: false
    image:
      repository: public.ecr.aws/aktosecurity/confluentinc-cp-kafka
      tag: 8.2.2-1-ubi9
    resources:
      requests:
        cpu: 1
        memory: "2Gi"
        ephemeral-storage: "500Mi"
      limits:
        cpu: 1
        memory: "2Gi"
        ephemeral-storage: "4Gi"

  type: ClusterIP
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"

ports:
  default:
    - port: 9092 # Over-ride this to change kafka service exposed port
      targetPort: 9092
  tls:
    - name: plaintext
      port: 9092
      targetPort: 9092
    - name: ssl
      port: 9093
      targetPort: 9093
  sasl:
    - name: sasl-plaintext
      port: 9092
      targetPort: 9092
    - name: sasl-ssl
      port: 9093
      targetPort: 9093
