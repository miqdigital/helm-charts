tokens:
  env:
    proxyUri: ""
    noProxy: ""

testing:
  aktoApiSecurityTesting:
    env:
      aktoAccountName: Helios
      aktoConfigName: staging
      newTestingEnabled: "true"
      kafkaBrokerUrl: localhost:29092
      puppeteerReplayServiceUrl: http://localhost:3000
      databaseAbstractorUrl: https://cyborg.akto.io
      automatedAgentBaseUrl: http://localhost:8000
      # If you want to use secrets to store database abstractor token. default: false
      useSecretsForDatabaseAbstractorToken: false
      # If not using secrets, place token here.
      databaseAbstractorToken: ""
      # If using secrets, place token here.
      databaseAbstractorTokenSecrets: 
        # Name of an existing secret containing the Database Abstractor Token
        existingSecret: ""
        # Token to use if existingSecret is not provided
        token: ""
      blockLogs: "false"
      aktoLogLevel: WARN
      miniTestingName: "akto-external-testing"

    image:
      repository: public.ecr.aws/aktosecurity/akto-api-security-mini-testing
      tag: 1.70.6_local
    imagePullPolicy: Always
    resources:
      requests:
        cpu: "200m"
        memory: "500Mi"
      limits:
        cpu: 2
        memory: "8Gi"

  prometheusServer:
    name: prometheus # name of port defined in the service/container
    port: 9400
    protocol: TCP
    metricsEndpoint:
      path: /metrics

  # Configuration for in-cluster Prometheus (default)
  kubePrometheus:
    enabled: true  # Set to false when using Grafana Cloud
    serviceName: prometheus-kube-prometheus-prometheus
    namespace: ""  # Leave empty to use same namespace as release
    port: 9090
    scrape:
      interval: 15s
      timeout: 10s

  # Configuration for Grafana Cloud (external Prometheus)
  # Set kubePrometheus.enabled=false when using this
  # Requires grafana-cloud-setup chart to be installed first
  grafanaCloud:
    enabled: false
    # Prometheus query endpoint (for KEDA to read metrics)
    queryUrl: ""  # e.g., https://prometheus-prod-43-prod-ap-south-1.grafana.net/api/prom
    # Username/Instance ID
    username: ""  # e.g., 2781763
    # API token for KEDA to query metrics (set via --set for security)
    readToken: ""
    # Secret name containing the read token
    secretName: grafana-cloud-tokens

  replicas: 1
  autoScaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    customMetrics:
      type: prometheus
      pollingInterval: 30
      cooldownPeriod: 300
      isModuleBusy:
        metricName: is_module_busy
        trigger:
          name: is_module_busy_avg
          target: 0.9
          type: Value

  aktoApiSecurityPuppeteerReplay:
    env:
      useSecretsForLogSenderApiKey: false
      logSenderApiKey: ""
      logSenderApiKeySecrets:
        existingSecret: ""
        token: ""
    image:
      repository: public.ecr.aws/aktosecurity/akto-puppeteer-replay
      tag: 1.49.4_latest
    imagePullPolicy: Always
    resources:
      requests:
        cpu: 1
        memory: "2Gi"
      limits:
        cpu: 1
        memory: "4Gi"

  aiAutomatedTesting:
    enabled: true
    image:
      repository: public.ecr.aws/aktosecurity/akto-ai-automated-testing
      tag: latest
    imagePullPolicy: Always
    port: 8000
    resources:
      requests:
        cpu: "250m"
        memory: "700Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

  agentTesting:
    enabled: false
    image:
      repository: public.ecr.aws/aktosecurity/akto-agentic-testing
      tag: latest
    imagePullPolicy: Always
    port: 5500
    env:
      nodeEnv: "production"
      agenticMode: false
      nodeTlsRejectUnauthorized: "0"
      useSessionManagement: true
      aktoUtilityServer: "http://localhost:8001"
      useSecretsForAnthropicApiKey: false
      anthropicApiKey: ""
      # If using secrets, place key here.
      anthropicApiKeySecrets:
        # Name of an existing secret containing the Anthropic API key
        existingSecret: ""
        # Token to use if existingSecret is not provided
        anthropicSecretKey: ""
    resources:
      requests:
        cpu: "250m"
        memory: "500Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

  kafka1:
    env:
      kafkaBrokerId: "1"
      kafkaCleanupPolicy: delete
      kafkaCreateTopics: akto.test.messages:1:1
      kafkaInterBrokerListenerName: LISTENER_DOCKER_EXTERNAL_LOCALHOST
      kafkaListenerSecurityProtocolMap: CONTROLLER:PLAINTEXT,LISTENER_DOCKER_EXTERNAL_LOCALHOST:PLAINTEXT,
        LISTENER_DOCKER_EXTERNAL_DIFFHOST:PLAINTEXT
      kafkaProcessRoles: "broker,controller"
      kafkaNodeId: "1"
      kafkaControllerQuorumVoters: "1@localhost:9094"
      kafkaControllerListenerNames: "CONTROLLER"
      kafkaListeners: "CONTROLLER://0.0.0.0:9094,LISTENER_DOCKER_EXTERNAL_LOCALHOST://0.0.0.0:29092,LISTENER_DOCKER_EXTERNAL_DIFFHOST://0.0.0.0:9092"
      kafkaLogCleanerEnable: "true"
      kafkaLogRetentionBytes: "10737418240"
      kafkaLogRetentionCheckIntervalMs: "60000"
      kafkaLogRetentionHours: "5"
      kafkaLogSegmentBytes: "104857600"
      kafkaOffsetsTopicReplicationFactor: "1"
      kafkaTransactionStateLogMinIsr: "1"
      kafkaTransactionStateLogReplicationFactor: "1"
      kafkaClusterId: "d7b2c9f3-5a3b-4c3b-8d4a-2b3c4d5e6f7a"
    image:
      repository: public.ecr.aws/aktosecurity/confluentinc-cp-kafka
      tag: 8.2.2-1-ubi9
    resources:
      requests:
        cpu: 1
        memory: "2Gi"
      limits:
        cpu: 2
        memory: "4Gi"
  ports:
  - port: 9092
    targetPort: 9092
  type: ClusterIP

keel:
  keel:
    env:
      awsAccessKeyId: ""
      awsRegion: ""
      awsSecretAccessKey: ""
      hipchatApprovalsBotName: ""
      hipchatApprovalsChannel: ""
      hipchatApprovalsPasswort: ""
      hipchatApprovalsUserName: ""
      hipchatChannels: ""
      hipchatToken: ""
      insecureRegistry: "true"
      mattermostEndpoint: ""
      notificationLevel: info
      webhookEndpoint: ""
    image:
      repository: public.ecr.aws/aktosecurity/keelhq-keel
      tag: akto_v1.0.0
    imagePullPolicy: Always
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
    enabled: true
  maxUnavailable: 1
  ports:
  - name: keel
    port: 9300
    protocol: TCP
    targetPort: 9300
  replicas: 1
  serviceAccount:
    annotations: {}
  type: LoadBalancer
kubernetesClusterDomain: cluster.local
